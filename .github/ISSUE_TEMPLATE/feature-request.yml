name: 功能建议
description: 对分析维度或站点功能有想法
title: "[功能建议] "
labels: ["feature-request"]
body:
  - type: dropdown
    id: category
    attributes:
      label: 建议类型
      options:
        - 分析维度
        - 站点功能
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 具体描述
      description: 请详细描述你的建议
      placeholder: 请描述你希望实现的功能或改进...
    validations:
      required: true

  - type: textarea
    id: value
    attributes:
      label: 预期价值
      description: 解决什么问题或带来什么收益？（选填）
      placeholder: 请说明预期效果...
